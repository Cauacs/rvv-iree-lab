name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install \
            --yes \
            --no-install-recommends \
            cmake \
            ninja-build

      - name: Configure
        run: |
          cmake \
            -S . \
            -B build/ci \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: |
          cmake \
            --build build/ci \
            --parallel 2

      - name: Run tests
        run: |
          ctest \
            --test-dir build/ci \
            --output-on-failure

      - name: Run architecture probe
        run: |
          ./build/ci/arch-info
